<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum AI — CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #08080f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    nav { background: #0f0f1a; border-bottom: 1px solid #2d2d5e; padding: 0 32px; display: flex; align-items: center; gap: 32px; height: 56px; }
    .logo { font-size: 18px; font-weight: 900; color: white; }
    .logo span { color: #a78bfa; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 0; border-bottom: 2px solid transparent; }
    nav a.active, nav a:hover { color: white; border-color: #7c3aed; }
    .main { padding: 32px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; background: #1e1e3a; color: #94a3b8; border: none; }
    .tab.active { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat { background: #0f0f1a; border: 1px solid #2d2d5e; border-radius: 10px; padding: 16px 24px; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #a78bfa; }
    .stat-label { font-size: 12px; color: #64748b; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; background: #0f0f1a; border-radius: 12px; overflow: hidden; }
    th { background: #1e1e3a; padding: 10px 14px; text-align: left; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px 14px; border-bottom: 1px solid #1a1a2e; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #131323; }
    .badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
    .badge-new { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge-contacted { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .badge-qualified { background: rgba(16,185,129,0.2); color: #34d399; }
    .badge-closed { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .badge-prospect { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .badge-lost { background: rgba(239,68,68,0.2); color: #f87171; }
    .actions { display: flex; gap: 6px; }
    .btn { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; }
    .btn-sm { background: #1e1e3a; color: #94a3b8; border: 1px solid #2d2d5e; }
    .btn-sm:hover { border-color: #7c3aed; color: #a78bfa; }
    .btn-danger { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #0f0f1a; border: 1px solid #2d2d5e; border-radius: 16px; padding: 28px; width: 480px; max-width: 95vw; }
    .modal h3 { font-size: 1rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: #1e1e3a; border: 1px solid #2d2d5e; border-radius: 8px;
      padding: 8px 12px; color: white; font-size: 13px; outline: none;
    }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .empty { text-align: center; padding: 48px; color: #475569; }
    .search { background: #1e1e3a; border: 1px solid #2d2d5e; border-radius: 8px; padding: 8px 14px; color: white; font-size: 13px; outline: none; width: 240px; }
  </style>
</head>
<body>
<nav>
  <div class="logo">Momentum<span>AI</span></div>
  <a href="/admin.html">Leads</a>
  <a href="/crm.html" class="active">CRM / Outreach</a>
  <a href="/budget.html">Budget</a>
</nav>
<div class="main">
  <h1>CRM & Outreach</h1>
  <p class="subtitle">Track prospects, leads, and deal pipeline</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('outreach')">Outreach Prospects</button>
    <button class="tab" onclick="switchTab('leads')">Website Leads</button>
    <button class="tab" onclick="switchTab('proposals')">Generate Proposal</button>
  </div>

  <!-- OUTREACH PANEL -->
  <div id="panel-outreach" class="panel active">
    <div class="stats" id="outreach-stats"></div>
    <div class="toolbar">
      <input class="search" id="outreach-search" placeholder="Search businesses..." oninput="filterOutreach()" />
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Prospect</button>
    </div>
    <table>
      <thead><tr><th>#</th><th>Business</th><th>Owner</th><th>City</th><th>Industry</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="outreach-body"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- LEADS PANEL -->
  <div id="panel-leads" class="panel">
    <div class="stats" id="leads-stats"></div>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Business</th><th>Email</th><th>Service</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody id="leads-body"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- PROPOSAL PANEL -->
  <div id="panel-proposals" class="panel">
    <div style="max-width:500px;background:#0f0f1a;border:1px solid #2d2d5e;border-radius:16px;padding:28px;margin-top:8px;">
      <h3 style="margin-bottom:20px;">Generate PDF Proposal</h3>
      <div class="form-group"><label>Client Name *</label><input id="p-name" placeholder="John Smith" /></div>
      <div class="form-group"><label>Business Name</label><input id="p-business" placeholder="Joe's Plumbing" /></div>
      <div class="form-group"><label>Email</label><input id="p-email" type="email" placeholder="john@example.com" /></div>
      <div class="form-group"><label>Interested Service</label><input id="p-service" placeholder="AI Chatbot" /></div>
      <div class="form-group"><label>Recommended Package</label>
        <select id="p-package">
          <option value="Starter">Starter — $299/mo</option>
          <option value="Growth" selected>Growth — $699/mo</option>
          <option value="Scale">Scale — $1,499/mo</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:8px;" onclick="generateProposal()">Generate & Download PDF →</button>
      <p id="proposal-status" style="margin-top:12px;font-size:13px;color:#a78bfa;display:none;"></p>
    </div>
  </div>
</div>

<!-- ADD PROSPECT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Prospect</h3>
    <div class="form-row">
      <div class="form-group"><label>Business Name *</label><input id="m-business" placeholder="Joe's Plumbing" /></div>
      <div class="form-group"><label>Owner Name</label><input id="m-owner" placeholder="Joe Smith" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input id="m-email" type="email" placeholder="joe@example.com" /></div>
      <div class="form-group"><label>Phone</label><input id="m-phone" placeholder="416-555-0100" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>City</label><input id="m-city" placeholder="Toronto" /></div>
      <div class="form-group"><label>Industry</label><input id="m-industry" placeholder="Plumbing" /></div>
    </div>
    <div class="form-group"><label>Website</label><input id="m-website" placeholder="https://..." /></div>
    <div class="form-group"><label>Notes</label><textarea id="m-notes" rows="2" placeholder="Pain points, source, etc."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProspect()">Add Prospect</button>
    </div>
  </div>
</div>

<script>
let allOutreach = [];

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['outreach','leads','proposals'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'outreach') loadOutreach();
  if (name === 'leads') loadLeads();
}

// OUTREACH
async function loadOutreach() {
  const data = await fetch('/api/outreach').then(r => r.json());
  allOutreach = data;
  renderOutreach(data);
  const stats = document.getElementById('outreach-stats');
  const total = data.length;
  const contacted = data.filter(d => d.status === 'contacted').length;
  const qualified = data.filter(d => d.status === 'qualified').length;
  stats.innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total Prospects</div></div>
    <div class="stat"><div class="stat-num">${contacted}</div><div class="stat-label">Contacted</div></div>
    <div class="stat"><div class="stat-num">${qualified}</div><div class="stat-label">Qualified</div></div>
  `;
}

function filterOutreach() {
  const q = document.getElementById('outreach-search').value.toLowerCase();
  renderOutreach(allOutreach.filter(r => 
    (r.business_name||'').toLowerCase().includes(q) ||
    (r.industry||'').toLowerCase().includes(q) ||
    (r.city||'').toLowerCase().includes(q)
  ));
}

function renderOutreach(data) {
  const tbody = document.getElementById('outreach-body');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No prospects yet. Add some! 🚀</td></tr>'; return; }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td style="color:#64748b">${r.id}</td>
      <td><strong>${r.business_name}</strong>${r.website ? `<br><a href="${r.website}" target="_blank" style="color:#a78bfa;font-size:11px">${r.website.replace('https://','').replace('http://','')}</a>` : ''}</td>
      <td>${r.owner_name||'—'}</td>
      <td>${r.city||'—'}</td>
      <td>${r.industry||'—'}</td>
      <td>${r.email ? `<a href="mailto:${r.email}" style="color:#a78bfa">${r.email}</a>` : '—'}</td>
      <td>
        <select onchange="updateOutreachStatus(${r.id}, this.value)" style="background:#1e1e3a;border:1px solid #2d2d5e;border-radius:6px;padding:3px 6px;color:white;font-size:12px;">
          ${['prospect','contacted','qualified','closed','lost'].map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td class="actions">
        <button class="btn btn-sm" onclick="deleteOutreach(${r.id})">✕</button>
      </td>
    </tr>
  `).join('');
}

async function updateOutreachStatus(id, status) {
  await fetch('/api/outreach/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
}

async function deleteOutreach(id) {
  if (!confirm('Delete this prospect?')) return;
  await fetch('/api/outreach/' + id, { method: 'DELETE' });
  loadOutreach();
}

function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

async function saveProspect() {
  const data = {
    business_name: document.getElementById('m-business').value,
    owner_name: document.getElementById('m-owner').value,
    email: document.getElementById('m-email').value,
    phone: document.getElementById('m-phone').value,
    city: document.getElementById('m-city').value || 'Toronto',
    industry: document.getElementById('m-industry').value,
    website: document.getElementById('m-website').value,
    notes: document.getElementById('m-notes').value
  };
  if (!data.business_name) { alert('Business name required'); return; }
  await fetch('/api/outreach', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  closeModal();
  ['m-business','m-owner','m-email','m-phone','m-city','m-industry','m-website','m-notes'].forEach(id => document.getElementById(id).value = '');
  loadOutreach();
}

// LEADS
async function loadLeads() {
  const data = await fetch('/api/leads').then(r => r.json());
  const stats = document.getElementById('leads-stats');
  const today = new Date().toDateString();
  stats.innerHTML = `
    <div class="stat"><div class="stat-num">${data.length}</div><div class="stat-label">Total Leads</div></div>
    <div class="stat"><div class="stat-num">${data.filter(d=>new Date(d.created_at).toDateString()===today).length}</div><div class="stat-label">Today</div></div>
    <div class="stat"><div class="stat-num">${data.filter(d=>d.status==='new').length}</div><div class="stat-label">Uncontacted</div></div>
  `;
  const tbody = document.getElementById('leads-body');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No leads yet.</td></tr>'; return; }
  tbody.innerHTML = data.map(l => `
    <tr>
      <td style="color:#64748b">${l.id}</td>
      <td><strong>${l.name}</strong></td>
      <td>${l.business||'—'}</td>
      <td><a href="mailto:${l.email}" style="color:#a78bfa">${l.email}</a></td>
      <td><span class="badge badge-new">${l.service||'—'}</span></td>
      <td>
        <select onchange="updateLeadStatus(${l.id}, this.value)" style="background:#1e1e3a;border:1px solid #2d2d5e;border-radius:6px;padding:3px 6px;color:white;font-size:12px;">
          ${['new','contacted','qualified','closed'].map(s => `<option value="${s}" ${l.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td style="color:#64748b;font-size:12px">${new Date(l.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn btn-sm" onclick="generateProposalForLead('${l.name}','${l.business||''}','${l.email||''}','${l.service||''}')">Proposal</button>
      </td>
    </tr>
  `).join('');
}

async function updateLeadStatus(id, status) {
  await fetch('/api/leads/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
}

// PROPOSALS
async function generateProposal() {
  const status = document.getElementById('proposal-status');
  status.textContent = 'Generating PDF...';
  status.style.display = 'block';
  try {
    const res = await fetch('/api/proposals', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('p-name').value,
        business: document.getElementById('p-business').value,
        email: document.getElementById('p-email').value,
        service: document.getElementById('p-service').value,
        package: document.getElementById('p-package').value
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'momentum-ai-proposal.pdf'; a.click();
    status.textContent = '✅ Proposal downloaded!';
  } catch(e) {
    status.textContent = '⚠️ Error: ' + e.message;
  }
}

function generateProposalForLead(name, business, email, service) {
  switchTab('proposals');
  document.getElementById('p-name').value = name;
  document.getElementById('p-business').value = business;
  document.getElementById('p-email').value = email;
  document.getElementById('p-service').value = service;
}

// INIT
loadOutreach();

// Close modal on outside click
document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
</body>
</html>
