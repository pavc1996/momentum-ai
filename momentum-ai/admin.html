<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum AI — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #08080f; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 32px; }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    h1 span { color: #a78bfa; }
    .subtitle { color: #64748b; margin-bottom: 32px; font-size: 14px; }
    .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat { background: #0f0f1a; border: 1px solid #2d2d5e; border-radius: 12px; padding: 20px 28px; }
    .stat-num { font-size: 2rem; font-weight: 700; color: #a78bfa; }
    .stat-label { font-size: 13px; color: #64748b; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #0f0f1a; border-radius: 12px; overflow: hidden; }
    th { background: #1e1e3a; padding: 12px 16px; text-align: left; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 12px 16px; border-bottom: 1px solid #1a1a2e; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #131323; }
    .badge { display: inline-block; background: rgba(124,58,237,0.15); color: #a78bfa; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .empty { text-align: center; padding: 48px; color: #475569; }
    .refresh { background: linear-gradient(135deg, #7c3aed, #4f46e5); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Momentum<span>AI</span> — Leads</h1>
  <p class="subtitle">All contact form submissions</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total">—</div><div class="stat-label">Total Leads</div></div>
    <div class="stat"><div class="stat-num" id="today">—</div><div class="stat-label">Today</div></div>
  </div>
  <button class="refresh" onclick="loadLeads()">↻ Refresh</button>
  <table>
    <thead>
      <tr><th>#</th><th>Name</th><th>Email</th><th>Business</th><th>Service</th><th>Message</th><th>Date</th></tr>
    </thead>
    <tbody id="leads-body"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
  </table>
  <script>
    async function loadLeads() {
      const res = await fetch('/api/leads');
      const leads = await res.json();
      const tbody = document.getElementById('leads-body');
      document.getElementById('total').textContent = leads.length;
      const today = new Date().toDateString();
      const todayCount = leads.filter(l => new Date(l.created_at).toDateString() === today).length;
      document.getElementById('today').textContent = todayCount;
      if (!leads.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No leads yet. Time to market! 🚀</td></tr>'; return; }
      tbody.innerHTML = leads.map(l => `
        <tr>
          <td>${l.id}</td>
          <td><strong>${l.name}</strong></td>
          <td><a href="mailto:${l.email}" style="color:#a78bfa">${l.email}</a></td>
          <td>${l.business || '—'}</td>
          <td><span class="badge">${l.service || '—'}</span></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.message}">${l.message || '—'}</td>
          <td style="color:#64748b;font-size:12px">${new Date(l.created_at).toLocaleString()}</td>
        </tr>
      `).join('');
    }
    loadLeads();
  </script>
</body>
</html>
